<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>월화수목금토일</title>
</head>
<body>
    <h3>월화수목금토일</h3>
    <hr>
    <script>
        let n = prompt("월화수목금토일 중에서 입력하세요");
        switch(n)
        {
            case "월":
            case "목":
            document.write(n+"은 출근");
            break;
            case "화":
            case "수":
            document.write(n+"는 출근");
            break;
            case "금":
            case "일":
            document.write(n+"은 출근");
            break;
            case "토":
            document.write(n+"는 출근");
            break;
            default:document.write("잘못입력하셧습니다.");

        }
    </script>
</body>
</html>
